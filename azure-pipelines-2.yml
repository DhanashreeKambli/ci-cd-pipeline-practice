trigger:
- main

pool:
   vmImage: 'ubuntu-latest'

variables:
     acrImage: 'myappregistry123.azurecr.io'
     imageName: 'myapp'
     fullImageName: ',myappregistry123.azurecr.io/myapp'

stages:
  - stage: BuildAndPush
    displayName: Build And Push Docker Image To ACR
    jobs:
      - job: DockerBuildPush
        steps:
          - checkout: self
          # Login to ACR
          - task: Docker@2
            displayName: Login to ACR
            inputs:
              command: login
              containerRegistry: 'acr-connection'

          # Build Docker Image
          - task: Docker@2
            displayName: Build Docker Image
            inputs:
              command: build
              repository: $(fullImageName)
              Dockerfile: '**/Dockerfile'
              tags: |
                latest

          # Push docker Image
          - task: Docker@2
            displayName: Push docker Image
            inputs:
              command: push
              repository: $(fullImageName)
              tags: |
                latest
              containerRegistry: 'acr-connection'