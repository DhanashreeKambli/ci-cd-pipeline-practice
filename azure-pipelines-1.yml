trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
   acrImage: 'myappregistry123.azurecr.io'
   imageName: 'myapp'
   fullImageName: 'myappregistry123.azurecr.io/myapp'

stages:
  - stage: BuildAndPush
    displayName: Build and Push Docker image to ACR
    jobs:
      - job: DockerBuildPush
        steps:
          - checkout: self
          #Login To ACR
          - task: Docker@2
            displayName: Login to ACR
            inputs:
              command: login
              containerRegistry: 'acr-connection'

          # Build Docker Image
          - task: Docker@2
            displayName: Build Docker Image
            inputs:
              command: build
              repository: $(fullImageName)
              Dockerfile: '**/Dockerfile'
              tags: |
                 latest

          # Push Docker Image
          - task: Docker@2
            displayName: Push Docker Image
            inputs:
              command: push
              repository: $(fullImageName)
              tags: |
                latest
              containerRegistry: 'acr-connection'
