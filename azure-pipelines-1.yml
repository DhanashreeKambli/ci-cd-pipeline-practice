trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  acrName: 'myappregistry123.azurecr.io'
  imageName: 'myapp'
  fullImageName: 'myappregistry123.azurecr.io/myapp'

stages:
- stage: BuildAndPush
  displayName: Build and Push Docker Image to ACR
  jobs:
  - job: DockerBuildPush
    steps:

    - checkout: self

    # Login to ACR
    - task: Docker@2
      displayName: Login to ACR
      inputs:
        command: login
        containerRegistry: 'acr-connection'

    # Build Docker Image (IMPORTANT: correct tag)
    - task: Docker@2
      displayName: Build Docker Image
      inputs:
        command: build
        repository: $(fullImageName)
        Dockerfile: '**/Dockerfile'
        tags: |
          latest

    # Push Docker Image to ACR
    - task: Docker@2
      displayName: Push Docker Image to ACR
      inputs:
        command: push
        repository: $(fullImageName)
        tags: |
          latest
        containerRegistry: 'acr-connection'