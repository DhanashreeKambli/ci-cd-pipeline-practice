apiVersion: apps/v1
kind: Deployment 
metadata:
  name: {{ .Release.Name }}-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec: 
      containers:
        - name: dhanu1996/myapp
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: 80

---
apiVersion: v1 
kind: Service 
metadata:
  name: {{ .Release.Name }}-service
spec: 
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 80