apiVersion: apps/v1
kind: Deployment 
metadata:
   name: {{ .Release.Name }}-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mini-app
  template:
    metadata:
      labels: 
        app: mini-app
    spec:
      containers:
         - name: nginx
           image: {{ .Values.image.reporsitory }}:{{ .Values.image.tag }}
           ports:
             - containerPort: 80
---

apiVersion: v1
kind: Service 
metadata:
  name: {{ .Release.Name }}-service
spec:
  type: ClusterIP
  selector:
    app: mini-app
  ports:
    - port: 80
      targetPort: 80